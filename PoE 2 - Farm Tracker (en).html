<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoE 2 Farm Tracker</title>
  <style>
    :root {
      --scale: 1;
      --opacity: 1;
      --bg-color: #1a1a1a;
      --card-bg: #242426;
      --input-bg: #333336;
      --text-color: #e0e0e0;
      --accent-blue: #0e639c;
      --accent-green: #238636;
      --accent-red: #d73a49;
      --timer-color: #ffcc00;
      --profit-color: #4ec9b0;
      
      --count-zero: #666666;
      --count-low: #ffffff;
      --count-mid: #ffd700;
      --count-high: #4ec9b0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: calc(12px * var(--scale));
      width: calc(380px * var(--scale));
      transform-origin: top left;
      transition: width 0.2s ease;
      opacity: var(--opacity);
      overflow-x: hidden;
    }

    body.layout-horizontal {
      width: calc(600px * var(--scale));
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    input[type=number] { -moz-appearance: textfield; }

    /* --- HEADER --- */
    .header {
      background-color: var(--card-bg);
      padding: calc(10px * var(--scale));
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .farm-select {
      background-color: var(--input-bg);
      border: 1px solid #444;
      color: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      font-weight: bold;
      flex-grow: 1;
      outline: none;
      font-size: calc(13px * var(--scale));
      cursor: pointer;
    }

    .header-controls { display: flex; gap: 6px; }

    .timer-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #141414;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid #333;
    }

    .timer {
      font-family: 'Consolas', 'JetBrains Mono', monospace;
      font-size: calc(18px * var(--scale));
      font-weight: bold;
      color: var(--timer-color);
    }

    .stats-divh {
      font-family: 'Consolas', 'JetBrains Mono', monospace;
      font-size: calc(16px * var(--scale));
      font-weight: bold;
      color: var(--profit-color);
    }

    button {
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: calc(12px * var(--scale));
      font-weight: bold;
      background-color: #3a3d41;
      transition: background-color 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }

    .btn-start { background-color: var(--accent-blue); }
    .btn-pause { background-color: var(--accent-red); }
    .btn-finish-run { background-color: #e8b23a; color: #111; }

    /* --- HISTORY / RUNS BLOCK --- */
    .history-box {
      background-color: var(--card-bg);
      border-radius: 6px;
      padding: calc(10px * var(--scale));
      border: 1px solid #333;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .history-summary {
      background-color: #141414;
      padding: 6px 10px;
      border-radius: 4px;
      display: grid;
      grid-template-columns: auto auto auto auto;
      align-items: center;
      row-gap: 4px;
      column-gap: 8px;
      border: 1px solid #333;
      font-weight: bold;
      font-size: calc(12px * var(--scale));
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .history-summary:hover {
      background-color: #1c1c1c;
    }

    .col-left { text-align: left; }
    .col-center { text-align: center; }

    .history-list {
      display: none;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 2px;
    }
    .history-list.open {
      display: flex;
    }

    .history-item {
      background-color: var(--input-bg);
      padding: 6px 8px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #3c3c40;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s;
    }

    .history-item:hover {
      background-color: #48484c;
      border-color: var(--accent-blue);
    }

    .history-details {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-grow: 1;
    }

    .history-row-top, .history-row-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-right: 6px;
    }

    .history-title {
      font-weight: bold;
      font-size: calc(12px * var(--scale));
      color: #ffffff;
    }

    .history-farm-tag {
      color: #4ec9b0;
      font-weight: normal;
      font-size: calc(11px * var(--scale));
    }

    .history-profit {
      color: #ffd700;
      font-family: 'Consolas', monospace;
      font-weight: bold;
      font-size: calc(12px * var(--scale));
    }

    .history-time {
      color: #aaa;
      font-size: calc(11px * var(--scale));
      font-family: 'Consolas', monospace;
    }

    .history-divh {
      color: var(--profit-color);
      font-size: calc(11px * var(--scale));
      font-family: 'Consolas', monospace;
      font-weight: 600;
    }

    /* --- ITEMS --- */
    .items-box-container {
      background-color: var(--card-bg);
      border-radius: 6px;
      padding: calc(10px * var(--scale));
      border: 1px solid #333;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 220px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 2px;
      min-height: 40px;
    }

    .empty-msg {
      color: #666;
      font-size: calc(12px * var(--scale));
      text-align: center;
      padding: 12px 0;
      font-style: italic;
    }

    .item-row {
      background-color: var(--input-bg);
      padding: calc(6px * var(--scale)) calc(8px * var(--scale));
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      width: 100%;
      cursor: grab;
      border: 1px solid #3c3c40;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .item-row.has-count {
      border-color: var(--accent-blue);
      background-color: #2c2c32;
    }

    .item-row:active { cursor: grabbing; }
    .item-row.dragging { opacity: 0.3; border-color: var(--accent-blue); }

    .drag-handle {
      color: #555;
      font-size: calc(12px * var(--scale));
      cursor: grab;
      flex-shrink: 0;
    }

    .item-title-input {
      background: transparent;
      border: 1px solid transparent;
      color: #ffffff;
      font-weight: 700;
      font-size: calc(13px * var(--scale));
      flex-grow: 1;
      min-width: 100px;
      padding: 2px 4px;
      border-radius: 3px;
      outline: none;
    }
    .item-title-input:hover { border-color: #444; }
    .item-title-input:focus { background-color: var(--card-bg); border-color: var(--accent-blue); }

    .hotkey-badge-container {
      width: 48px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .hotkey-badge {
      font-size: calc(9px * var(--scale));
      background-color: #141414;
      color: var(--profit-color);
      border: 1px solid #555;
      padding: 2px 5px;
      border-radius: 4px;
      font-family: 'Consolas', monospace;
      font-weight: bold;
      white-space: nowrap;
    }

    .price-container {
      display: flex;
      align-items: center;
      background-color: rgba(0,0,0,0.35);
      border: 1px solid #444;
      border-radius: 4px;
      padding: 2px 4px;
      flex-shrink: 0;
    }

    .price-input {
      font-family: 'Consolas', 'JetBrains Mono', monospace;
      color: #ffd700;
      font-weight: bold;
      font-size: calc(11px * var(--scale));
      width: 30px;
      text-align: right;
      background: transparent;
      border: none;
      outline: none;
    }

    .price-label {
      font-size: calc(10px * var(--scale));
      color: #888;
      margin-left: 2px;
    }

    .counter-controls {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .btn-step {
      background-color: #3a3d41;
      width: calc(26px * var(--scale));
      height: calc(26px * var(--scale));
      font-size: calc(13px * var(--scale));
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .count-input {
      font-family: 'Consolas', 'JetBrains Mono', monospace;
      font-weight: bold;
      font-size: calc(14px * var(--scale));
      width: calc(34px * var(--scale));
      text-align: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      outline: none;
      user-select: text;
    }
    .count-input:hover { border-color: #444; }
    .count-input:focus { background-color: var(--input-bg); border-color: var(--accent-blue); }

    .count-input.val-zero { color: var(--count-zero); }
    .count-input.val-low  { color: var(--count-low); }
    .count-input.val-mid  { color: var(--count-mid); }
    .count-input.val-high { color: var(--count-high); }

    /* --- RUN EDIT MODAL --- */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .modal-overlay.open { display: flex; }

    .modal-card {
      background-color: var(--card-bg);
      border: 1px solid #555;
      border-radius: 6px;
      width: 100%;
      max-width: 380px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #444;
      padding-bottom: 6px;
      font-weight: bold;
    }

    .modal-items-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .modal-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--input-bg);
      padding: 4px 8px;
      border-radius: 4px;
      gap: 6px;
    }

    /* --- BOTTOM BAR --- */
    .nav-bar-bottom { display: flex; gap: 4px; margin-top: 4px; }
    .nav-bar-bottom button {
      flex: 1;
      background-color: var(--card-bg);
      border: 1px solid #333;
      font-size: calc(10px * var(--scale));
      padding: 6px 4px;
    }

    /* --- EXPANDABLE PANELS --- */
    .panel {
      display: none;
      background-color: var(--card-bg);
      padding: 10px;
      border-radius: 6px;
      margin-top: 6px;
      flex-direction: column;
      gap: 8px;
      font-size: calc(11px * var(--scale));
      border: 1px solid #444;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .panel.open { display: flex; }

    .panel-row { display: flex; gap: 6px; align-items: center; }
    .panel-row input[type="text"] {
      background-color: var(--input-bg);
      border: 1px solid #555;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      flex-grow: 1;
      outline: none;
    }

    .panel-row input[type="range"] {
      flex-grow: 1;
      accent-color: var(--accent-blue);
      cursor: pointer;
    }

    .preset-item-btn {
      flex-grow: 0;
      flex-shrink: 0;
      text-align: center;
      background: transparent;
      color: white;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 10px;
    }
    .preset-item-btn:hover { background-color: var(--input-bg); }

    .hotkey-setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--input-bg);
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #444;
    }

    .btn-key-bind {
      background-color: #141414;
      border: 1px solid #555;
      color: var(--profit-color);
      font-family: 'Consolas', monospace;
      padding: 4px 6px;
      border-radius: 4px;
      min-width: 65px;
      flex-shrink: 0;
      text-align: center;
      font-size: 10px;
    }
    .btn-key-bind.listening {
      border-color: var(--timer-color);
      color: var(--timer-color);
      animation: pulse 1s infinite;
    }

    .panel-divider {
      border: none;
      border-top: 1px solid #3c3c40;
      margin: 4px 0;
    }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body id="appBody">

  <!-- Block 1: Timer -->
  <div class="header">
    <div class="header-top">
      <select class="farm-select" id="presetSelect" onchange="handlePresetSelect(this.value)">
        <!-- Generated via JS -->
      </select>
      <div class="header-controls">
        <button id="btnToggle" class="btn-start" onclick="toggleTimer()">▶</button>
        <button onclick="resetTimer()" title="Reset Timer">↺</button>
        <button class="btn-finish-run" onclick="finishRun()" title="Save this run to history and reset for the next">🏁 Run</button>
      </div>
    </div>

    <div class="timer-container">
      <span class="timer" id="timer">⏱ 00:00:00</span>
      <span class="stats-divh" id="statsDivh">🔥 0.0 Div/h</span>
    </div>
  </div>

  <!-- Block 2: Runs / History -->
  <div class="history-box">
    <div class="history-summary" onclick="toggleHistoryList()" title="Click to expand/collapse history">
      <div class="col-left">Runs:</div>
      <div class="col-center"><span id="summaryRuns" style="color:var(--profit-color)">0</span></div>
      <div class="col-left">Avg:</div>
      <div class="col-center"><span id="summaryAvgTime" style="color:var(--timer-color)">00:00</span></div>
      
      <div class="col-left">Total:</div>
      <div class="col-center"><span id="summaryTotalDiv" style="color:#ffd700">0.0 D</span></div>
      <div class="col-left">Rate:</div>
      <div class="col-center"><span id="summaryDivH" style="color:var(--profit-color)">0.0</span> <span id="historyToggleIcon" style="font-size:10px; margin-left:2px;">▼</span></div>
    </div>

    <div class="history-list" id="historyList"></div>
  </div>

  <!-- Block 3: Items -->
  <div class="items-box-container">
    <div class="item-list" id="itemList"></div>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="nav-bar-bottom">
    <button id="btnPresets" onclick="togglePanel('presets', event)">📁 Presets</button>
    <button id="btnItems" onclick="togglePanel('items', event)">📦 Items</button>
    <button id="btnDisplay" onclick="togglePanel('display', event)">⚙️ Layout</button>
    <button id="btnHotkeys" onclick="togglePanel('hotkeys', event)">⚡ Hotkeys</button>
    <button id="btnData" onclick="togglePanel('data', event)">💾 Data</button>
  </div>

  <!-- Presets Panel -->
  <div class="panel" id="panelPresets">
    <div style="font-weight:bold; color:var(--profit-color); margin-bottom:2px;">➕ Add New Preset:</div>
    <div class="panel-row">
      <input type="text" id="presetNameInput" placeholder="Preset name..." style="flex:1; min-width:80px;" oninput="checkNewPresetInput(this.value)" onkeydown="if(event.key==='Enter') savePresetFromPanel()">
      <button id="btnNewPresetHotkey" class="btn-key-bind" style="opacity:0.5;" disabled onclick="startListeningNewPresetHotkey(this)">Hotkey</button>
      <button class="btn-add" onclick="savePresetFromPanel()">Save</button>
    </div>
    <hr class="panel-divider">
    <div id="presetList" style="display:flex; flex-direction:column; gap:4px; max-height:160px; overflow-y:auto; overflow-x:hidden;"></div>
  </div>

  <!-- Items Panel -->
  <div class="panel" id="panelItems">
    <div style="font-weight:bold; color:var(--profit-color); margin-bottom:2px;">➕ Add New Item:</div>
    <div class="panel-row">
      <input type="text" id="newItemName" placeholder="Item name..." style="flex:1; min-width:80px;" oninput="checkNewItemInput(this.value)" onkeydown="if(event.key==='Enter') addItemFromPanel()">
      <button id="btnNewItemHotkey" class="btn-key-bind" style="opacity:0.5;" disabled onclick="startListeningNewItemHotkey(this)">Hotkey</button>
      <input type="number" id="newItemPrice" placeholder="Price D" step="0.1" min="0" disabled style="width:55px; background:var(--input-bg); border:1px solid #555; color:#ffd700; padding:4px; border-radius:4px; text-align:right; opacity:0.5;" onkeydown="if(event.key==='Enter') addItemFromPanel()">
      <button class="btn-add" onclick="addItemFromPanel()">Save</button>
    </div>
    <hr class="panel-divider">
    <div id="panelItemsManageList" style="display:flex; flex-direction:column; gap:6px; max-height:160px; overflow-y:auto; overflow-x:hidden;"></div>
  </div>

  <!-- Layout Panel -->
  <div class="panel" id="panelDisplay">
    <div class="panel-row">
      <span style="color:#aaa;">Scale:</span>
      <button id="btnScaleP" onclick="setScale(0.85)" style="background:#3a3d41;">S</button>
      <button id="btnScaleM" onclick="setScale(1)" style="background:#3a3d41;">M</button>
      <button id="btnScaleG" onclick="setScale(1.2)" style="background:#3a3d41;">L</button>
    </div>
    <div class="panel-row">
      <span style="color:#aaa;">Orientation:</span>
      <button id="btnLayoutVert" onclick="setLayout('vertical')" style="background:#3a3d41;">Vertical</button>
      <button id="btnLayoutHoriz" onclick="setLayout('horizontal')" style="background:#3a3d41;">Horizontal</button>
    </div>
    <div class="panel-row">
      <span style="color:#aaa;">Opacity:</span>
      <input type="range" id="opacitySlider" min="0.3" max="1" step="0.05" value="1" oninput="setOpacity(this.value)">
      <span id="opacityVal" style="width: 35px; text-align: right; font-weight: bold; color:var(--profit-color);">100%</span>
    </div>
  </div>

  <!-- Hotkeys Panel -->
  <div class="panel" id="panelHotkeys">
    <div style="font-weight:bold; color:var(--profit-color); margin-bottom:4px;">⚡ System:</div>
    <div id="systemHotkeyList" style="display:flex; flex-direction:column; gap:6px;"></div>
  </div>

  <!-- Data Panel -->
  <div class="panel" id="panelData">
    <div class="panel-row">
      <button class="btn-add" style="flex:1;" onclick="exportBackup()">📥 Download Backup (.json)</button>
    </div>
    <div class="panel-row">
      <button style="flex:1; background-color:#3a3d41;" onclick="document.getElementById('fileImportInput').click()">📤 Load Backup (.json)</button>
      <input type="file" id="fileImportInput" accept=".json" style="display:none" onchange="importBackup(event)">
    </div>
    <div class="panel-row" style="margin-top:2px;">
      <button style="flex:1; background-color:#5865F2; color:white;" onclick="copyDiscordSummary(this)">📋 Copy Summary for Discord</button>
    </div>
    <hr class="panel-divider">
    <div class="panel-row">
      <button style="flex:1; background-color:#d73a49; color:white;" onclick="clearActivePresetRuns()">⏱ Clear Runs</button>
      <button style="flex:1; background-color:#d73a49; color:white;" onclick="clearActivePresetItems()">📦 Clear Items</button>
    </div>
    <hr class="panel-divider">
    <div class="panel-row">
      <button style="flex:1; background-color:#900; color:white;" onclick="resetToFirstAccess()">⚠️ Total Reset (First Access)</button>
    </div>
  </div>

  <!-- EDIT RUN MODAL -->
  <div class="modal-overlay" id="editRunModal">
    <div class="modal-card">
      <div class="modal-header">
        <span id="modalRunTitle">Edit Run</span>
        <button onclick="closeEditModal()" style="background:none; color:#888; font-size:16px;" title="Close">✕</button>
      </div>

      <div class="panel-row">
        <span style="font-weight:bold; color:#aaa;">Time (min):</span>
        <input type="number" id="modalRunTimeInput" step="0.1" min="0.1" style="background:var(--input-bg); border:1px solid #555; color:white; padding:4px; border-radius:4px; width:80px; text-align:center; font-family:Consolas,monospace;" onkeydown="if(event.key==='Enter') saveRunEdit()">
      </div>

      <div class="modal-items-list" id="modalItemsList"></div>

      <div class="panel-row" style="margin-top:6px; gap:8px;">
        <button class="btn-add" style="flex:1; padding:8px;" onclick="saveRunEdit()">💾 Save</button>
        <button style="background:#555; padding:8px;" onclick="closeEditModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'poe2_farm_tracker_v36_final';

    const defaultState = {
      activePreset: null,
      seconds: 0,
      scale: 1,
      opacity: 1,
      layout: 'vertical',
      counters: [],
      presets: {},
      presetHotkeys: {},
      history: [],
      systemHotkeys: {
        timer: null,
        finishRun: null,
        newPreset: null
      }
    };

    let state = JSON.parse(JSON.stringify(defaultState));
    let tempNewItemHotkey = null;
    let tempNewPresetHotkey = null;
    let timerInterval = null;
    let editingRunId = null;

    function toggleHistoryList() {
      const listEl = document.getElementById('historyList');
      const iconEl = document.getElementById('historyToggleIcon');
      const isOpen = listEl.classList.toggle('open');
      if (iconEl) iconEl.innerText = isOpen ? '▲' : '▼';
    }

    function checkNewItemInput(val) {
      const priceInput = document.getElementById('newItemPrice');
      const hotkeyBtn = document.getElementById('btnNewItemHotkey');
      const hasText = val.trim().length > 0;

      if (priceInput) {
        priceInput.disabled = !hasText;
        priceInput.style.opacity = hasText ? "1" : "0.5";
      }
      if (hotkeyBtn) {
        hotkeyBtn.disabled = !hasText;
        hotkeyBtn.style.opacity = hasText ? "1" : "0.5";
      }
    }

    function checkNewPresetInput(val) {
      const hotkeyBtn = document.getElementById('btnNewPresetHotkey');
      const hasText = val.trim().length > 0;
      if (hotkeyBtn) {
        hotkeyBtn.disabled = !hasText;
        hotkeyBtn.style.opacity = hasText ? "1" : "0.5";
      }
    }

    function startListeningNewItemHotkey(btnEl) {
      btnEl.innerText = "Key...";
      btnEl.classList.add('listening');

      const keyHandler = (e) => {
        e.preventDefault();
        e.stopPropagation();

        if (e.key === 'Escape') {
          tempNewItemHotkey = null;
          btnEl.innerText = "Hotkey";
          btnEl.classList.remove('listening');
          window.removeEventListener('keydown', keyHandler, true);
          return;
        }

        const combo = buildHotkeyString(e);
        if (!combo) return;

        tempNewItemHotkey = combo;
        btnEl.innerText = `[ ${combo} ]`;
        btnEl.classList.remove('listening');
        window.removeEventListener('keydown', keyHandler, true);
      };

      window.addEventListener('keydown', keyHandler, true);
    }

    function startListeningNewPresetHotkey(btnEl) {
      btnEl.innerText = "Key...";
      btnEl.classList.add('listening');

      const keyHandler = (e) => {
        e.preventDefault();
        e.stopPropagation();

        if (e.key === 'Escape') {
          tempNewPresetHotkey = null;
          btnEl.innerText = "Hotkey";
          btnEl.classList.remove('listening');
          window.removeEventListener('keydown', keyHandler, true);
          return;
        }

        const combo = buildHotkeyString(e);
        if (!combo) return;

        tempNewPresetHotkey = combo;
        btnEl.innerText = `[ ${combo} ]`;
        btnEl.classList.remove('listening');
        window.removeEventListener('keydown', keyHandler, true);
      };

      window.addEventListener('keydown', keyHandler, true);
    }

    function formatTime(totalSeconds) {
      const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      const secs = String(totalSeconds % 60).padStart(2, '0');
      return hrs === "00" ? `${mins}:${secs}` : `${hrs}:${mins}:${secs}`;
    }

    function formatHotkeyCompact(hotkey) {
      if (!hotkey) return '';
      return hotkey
        .replace(/Control/gi, 'C')
        .replace(/Ctrl/gi, 'C')
        .replace(/Shift/gi, 'S')
        .replace(/Alt/gi, 'A')
        .replace(/\s+\+\s+/g, '+');
    }

    // --- GLOBAL KEYBOARD CAPTURE ---
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const modal = document.getElementById('editRunModal');
        if (modal.classList.contains('open')) {
          closeEditModal();
          return;
        }
      }

      if (['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;

      const combo = buildHotkeyString(e);
      if (!combo) return;

      if (state.systemHotkeys) {
        if (state.systemHotkeys.timer === combo) {
          e.preventDefault();
          toggleTimer();
          return;
        }
        if (state.systemHotkeys.finishRun === combo) {
          e.preventDefault();
          finishRun();
          return;
        }
        if (state.systemHotkeys.newPreset === combo) {
          e.preventDefault();
          createNewPresetFlow();
          return;
        }
      }

      if (state.presetHotkeys) {
        const targetPreset = Object.keys(state.presetHotkeys).find(pName => state.presetHotkeys[pName] === combo);
        if (targetPreset) {
          e.preventDefault();
          loadPreset(targetPreset);
          return;
        }
      }

      if (state.counters) {
        const foundIdx = state.counters.findIndex(item => item.hotkey === combo);
        if (foundIdx !== -1) {
          e.preventDefault();
          changeCount(foundIdx, 1);
        }
      }
    });

    function buildHotkeyString(e) {
      if (['Control', 'Shift', 'Alt', 'Meta'].includes(e.key)) return null;

      let parts = [];
      if (e.ctrlKey) parts.push('Ctrl');
      if (e.shiftKey) parts.push('Shift');
      if (e.altKey) parts.push('Alt');

      let mainKey = e.key.toUpperCase();

      if (e.code.startsWith('Numpad')) {
        mainKey = `N${e.code.replace('Numpad', '')}`;
      } else if (mainKey === ' ') {
        mainKey = 'Space';
      }

      parts.push(mainKey);
      return parts.join(' + ');
    }

    // --- TIMER ---
    function updateTimerDisplay() {
      document.getElementById('timer').innerText = `⏱ ${formatTime(state.seconds)}`;
      updateProfitDisplay();
    }

    function toggleTimer() {
      const btn = document.getElementById('btnToggle');
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
        btn.innerText = "▶";
        btn.className = "btn-start";
      } else {
        timerInterval = setInterval(() => {
          state.seconds++;
          updateTimerDisplay();
          saveState();
        }, 1000);
        btn.innerText = "⏸";
        btn.className = "btn-pause";
      }
    }

    function resetTimer() {
      if (timerInterval) toggleTimer();
      state.seconds = 0;
      updateTimerDisplay();
      saveState();
    }

    // --- RUN REGISTRATION & EDITING ---
    function finishRun() {
      const runProfit = calculateTotalDivines();
      const runTime = state.seconds;

      if (runTime === 0 && runProfit === 0) return;

      const runHours = runTime > 0 ? (runTime / 3600) : 0;
      const runDivH = runHours > 0 ? (runProfit / runHours).toFixed(1) : "0.0";

      const runItems = state.counters.map(c => ({
        name: c.name,
        price: c.price || 0,
        count: c.count || 0
      }));

      const activeRunPreset = (state.activePreset === "__ALL__" || !state.activePreset) ? "General" : state.activePreset;

      const newRun = {
        id: Date.now(),
        runNumber: state.history.length + 1,
        time: runTime,
        profit: runProfit,
        divH: runDivH,
        presetName: activeRunPreset,
        items: JSON.parse(JSON.stringify(runItems))
      };

      state.history.push(newRun);

      resetTimer();
      resetAllCounts();

      renderHistoryPanel();
      saveState();
    }

    function openEditRunModal(id, e) {
      if (e.target.classList.contains('btn-del')) return;

      const run = state.history.find(r => r.id === id);
      if (!run) return;

      editingRunId = id;
      document.getElementById('modalRunTitle').innerText = `Edit Run #${run.runNumber} (${run.presetName})`;
      document.getElementById('modalRunTimeInput').value = (run.time / 60).toFixed(1);

      const listEl = document.getElementById('modalItemsList');
      listEl.innerHTML = '';

      run.items.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'modal-item-row';
        row.innerHTML = `
          <span style="font-weight:bold; flex-grow:1; font-size:12px; color:#fff;">${item.name}</span>
          <div style="display:flex; align-items:center; gap:2px;">
            <input type="number" id="modal-price-${idx}" value="${item.price}" step="0.1" min="0" style="width:42px; height:24px; font-size:11px; background:var(--bg-color); color:#ffd700; border:1px solid #555; border-radius:3px; text-align:right; outline:none;" oninput="updateModalItemPrice(${idx}, this.value)">
            <span style="font-size:10px; color:#888; font-weight:bold;">D</span>
          </div>
          <div class="counter-controls">
            <button class="btn-step" onclick="adjustModalItemCount(${idx}, -1)">-</button>
            <input type="number" class="count-input" id="modal-count-${idx}" value="${item.count}" style="width:38px; height:26px; font-size:15px; color:#ffffff; background:transparent; border:none; text-align:center; font-family:Consolas,monospace; font-weight:bold;" oninput="updateModalItemCount(${idx}, this.value)">
            <button class="btn-step" onclick="adjustModalItemCount(${idx}, 1)" style="background-color: var(--accent-blue)">+</button>
          </div>
        `;
        listEl.appendChild(row);
      });

      document.getElementById('editRunModal').classList.add('open');
    }

    function adjustModalItemCount(idx, amount) {
      const run = state.history.find(r => r.id === editingRunId);
      if (!run) return;

      run.items[idx].count = Math.max(0, run.items[idx].count + amount);
      const input = document.getElementById(`modal-count-${idx}`);
      if (input) input.value = run.items[idx].count;
    }

    function updateModalItemCount(idx, val) {
      const run = state.history.find(r => r.id === editingRunId);
      if (!run) return;

      const current = parseInt(val, 10);
      run.items[idx].count = (isNaN(current) || current < 0) ? 0 : current;
    }

    function updateModalItemPrice(idx, val) {
      const run = state.history.find(r => r.id === editingRunId);
      if (!run) return;

      const parsed = parseFloat(val);
      run.items[idx].price = (isNaN(parsed) || parsed < 0) ? 0 : parsed;
    }

    function saveRunEdit() {
      const run = state.history.find(r => r.id === editingRunId);
      if (run) {
        const inputMinutes = parseFloat(document.getElementById('modalRunTimeInput').value);
        const newSecs = (!isNaN(inputMinutes) && inputMinutes > 0) ? Math.round(inputMinutes * 60) : run.time;
        run.time = Math.max(1, newSecs);

        const newProfit = run.items.reduce((total, i) => total + (i.price * i.count), 0);
        run.profit = newProfit;

        const runHours = run.time / 3600;
        run.divH = runHours > 0 ? (newProfit / runHours).toFixed(1) : "0.0";

        renderHistoryPanel();
        saveState();
      }
      closeEditModal();
    }

    function closeEditModal() {
      document.getElementById('editRunModal').classList.remove('open');
      editingRunId = null;
    }

    function deleteRun(id) {
      state.history = state.history.filter(r => r.id !== id);
      renderHistoryPanel();
      saveState();
    }

    function renderHistoryPanel() {
      const list = document.getElementById('historyList');
      list.innerHTML = '';

      const activeFilter = state.activePreset;
      const filteredHistory = (activeFilter === "__ALL__" || !activeFilter) 
        ? state.history 
        : state.history.filter(r => r.presetName === activeFilter);

      if (filteredHistory.length === 0) {
        list.innerHTML = '<div class="empty-msg">No history recorded for this filter.</div>';
        document.getElementById('summaryRuns').innerText = '0';
        document.getElementById('summaryAvgTime').innerText = '00:00';
        document.getElementById('summaryTotalDiv').innerText = '0.0 D';
        document.getElementById('summaryDivH').innerText = '0.0';
        return;
      }

      let totalSecs = 0;
      let totalDivs = 0;

      filteredHistory.forEach(run => {
        totalSecs += run.time;
        totalDivs += run.profit;

        const row = document.createElement('div');
        row.className = 'history-item';
        row.onclick = (e) => openEditRunModal(run.id, e);

        row.innerHTML = `
          <div class="history-details">
            <div class="history-row-top">
              <span class="history-title">Run #${run.runNumber} <span class="history-farm-tag">(${run.presetName})</span></span>
              <span class="history-profit">+${run.profit.toFixed(1)} Div</span>
            </div>
            <div class="history-row-bottom">
              <span class="history-time">⏱ ${formatTime(run.time)}</span>
              <span class="history-divh">🔥 ${run.divH} Div/h</span>
            </div>
          </div>
          <button class="btn-del" onclick="deleteRun(${run.id})" title="Delete this run">🗑</button>
        `;
        list.appendChild(row);
      });

      const avgSecs = Math.round(totalSecs / filteredHistory.length);
      const totalHours = totalSecs / 3600;
      const overallDivH = totalHours > 0 ? (totalDivs / totalHours).toFixed(1) : "0.0";

      document.getElementById('summaryRuns').innerText = filteredHistory.length;
      document.getElementById('summaryAvgTime').innerText = formatTime(avgSecs);
      document.getElementById('summaryTotalDiv').innerText = `${totalDivs.toFixed(1)} D`;
      document.getElementById('summaryDivH').innerText = `${overallDivH} Div/h`;
    }

    function clearActivePresetRuns() {
      const activeFilter = state.activePreset;
      if (activeFilter === "__ALL__" || !activeFilter) {
        if (confirm("Do you really want to clear ALL runs from all presets?")) {
          state.history = [];
          renderHistoryPanel();
          saveState();
        }
      } else {
        if (confirm(`Do you really want to delete all saved runs for preset '${activeFilter}'?`)) {
          state.history = state.history.filter(run => run.presetName !== activeFilter);
          renderHistoryPanel();
          saveState();
        }
      }
    }

    function clearActivePresetItems() {
      const activeName = state.activePreset;
      if (!activeName || activeName === "__ALL__") {
        alert("⚠️ Select a specific preset to clear items.");
        return;
      }
      if (confirm(`Do you really want to remove all items from preset '${activeName}'?`)) {
        state.counters = [];
        renderItems();
        autoSyncPreset();
        saveState();
      }
    }

    // --- EXPORT, IMPORT, DISCORD & RESET ---
    function exportBackup() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `poe2_tracker_backup_${Date.now()}.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }

    function importBackup(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const imported = JSON.parse(evt.target.result);
          if (imported && typeof imported === 'object') {
            state = { ...defaultState, ...imported };
            saveState();
            loadState();
            alert('Backup loaded successfully!');
          }
        } catch (err) {
          alert('Error loading the backup file.');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    function copyDiscordSummary(btnEl) {
      const activeFilter = state.activePreset;
      const filteredHistory = (activeFilter === "__ALL__" || !activeFilter) 
        ? state.history 
        : state.history.filter(r => r.presetName === activeFilter);
      
      const farmName = (activeFilter === "__ALL__") ? "All" : (activeFilter || "General");
      const totalRuns = filteredHistory.length;

      let totalSecs = 0;
      let totalDivs = 0;
      filteredHistory.forEach(r => {
        totalSecs += r.time;
        totalDivs += r.profit;
      });

      const avgSecs = totalRuns > 0 ? Math.round(totalSecs / totalRuns) : 0;
      const totalHours = totalSecs / 3600;
      const avgDivH = totalHours > 0 ? (totalDivs / totalHours).toFixed(1) : "0.0";

      const text = `📊 **PoE 2 Farm Report** - \`${farmName}\`\n` +
                   `⏱ **Runs:** ${totalRuns} | **Avg Time:** ${formatTime(avgSecs)}\n` +
                   `💰 **Total Profit:** ${totalDivs.toFixed(1)} Div | 🔥 **Overall Rate:** ${avgDivH} Div/h`;

      navigator.clipboard.writeText(text).then(() => {
        const origText = btnEl.innerText;
        btnEl.innerText = "✓ Copied!";
        setTimeout(() => { btnEl.innerText = origText; }, 2000);
      });
    }

    function resetToFirstAccess() {
      if (confirm("Are you sure you want to reset EVERYTHING? This will clear all presets, history, and keyboard shortcuts.")) {
        localStorage.removeItem(STORAGE_KEY);
        state = JSON.parse(JSON.stringify(defaultState));
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        loadState();
        closeAllPanels();
        alert("Application reset to first access state!");
      }
    }

    // --- PROFIT & DIV/H CALCULATION ---
    function calculateTotalDivines() {
      if (!state.counters) return 0;
      return state.counters.reduce((total, item) => {
        const price = parseFloat(item.price) || 0;
        const count = parseInt(item.count, 10) || 0;
        return total + (price * count);
      }, 0);
    }

    function updateProfitDisplay() {
      const totalDivines = calculateTotalDivines();
      const divhEl = document.getElementById('statsDivh');

      if (state.seconds > 0 && totalDivines > 0) {
        const hours = state.seconds / 3600;
        const divPerHour = (totalDivines / hours).toFixed(1);
        divhEl.innerText = `🔥 ${divPerHour} Div/h`;
      } else if (totalDivines > 0) {
        divhEl.innerText = `💰 ${totalDivines.toFixed(1)} Div`;
      } else {
        divhEl.innerText = `🔥 0.0 Div/h`;
      }
    }

    function getCountColorClass(val) {
      if (val === 0) return 'val-zero';
      if (val >= 1 && val <= 9) return 'val-low';
      if (val >= 10 && val <= 99) return 'val-mid';
      return 'val-high';
    }

    // --- MAIN ITEM LIST MANAGEMENT ---
    function renderItems() {
      const list = document.getElementById('itemList');
      list.innerHTML = '';

      let itemsToRender = [];

      if (state.activePreset === "__ALL__") {
        const aggregatedMap = {};
        
        Object.keys(state.presets).forEach(pName => {
          const pItems = state.presets[pName] || [];
          pItems.forEach(i => {
            const key = i.name.trim().toLowerCase();
            if (!aggregatedMap[key]) {
              aggregatedMap[key] = { name: i.name, price: i.price || 0, count: i.count || 0, hotkey: i.hotkey || null };
            } else {
              aggregatedMap[key].count += (i.count || 0);
              if (!aggregatedMap[key].price && i.price) aggregatedMap[key].price = i.price;
            }
          });
        });

        state.history.forEach(run => {
          if (run.items) {
            run.items.forEach(i => {
              const key = i.name.trim().toLowerCase();
              if (!aggregatedMap[key]) {
                aggregatedMap[key] = { name: i.name, price: i.price || 0, count: i.count || 0, hotkey: null };
              } else {
                aggregatedMap[key].count += (i.count || 0);
                if (!aggregatedMap[key].price && i.price) aggregatedMap[key].price = i.price;
              }
            });
          }
        });

        itemsToRender = Object.values(aggregatedMap);
      } else {
        itemsToRender = state.counters || [];
      }

      if (itemsToRender.length === 0) {
        list.innerHTML = '<div class="empty-msg">No items registered. Use the "📦 Items" tab at the bottom to add.</div>';
        updateProfitDisplay();
        return;
      }

      itemsToRender.forEach((item, index) => {
        const row = document.createElement('div');
        const hasCount = (item.count || 0) > 0;
        row.className = `item-row ${hasCount ? 'has-count' : ''}`;
        row.id = `item-row-${index}`;
        row.draggable = (state.activePreset !== "__ALL__");
        row.dataset.index = index;

        const colorClass = getCountColorClass(item.count);
        const compactKey = formatHotkeyCompact(item.hotkey);
        const hotkeyHtml = compactKey ? `<span class="hotkey-badge" title="${item.hotkey}">${compactKey}</span>` : '';
        const dragHandleHtml = (state.activePreset !== "__ALL__") ? '<span class="drag-handle" title="Hold to reorder">⋮⋮</span>' : '<span style="width:12px"></span>';

        row.innerHTML = `
          ${dragHandleHtml}
          <input type="text" class="item-title-input" value="${item.name}" ${state.activePreset === "__ALL__" ? 'disabled' : ''} onchange="updateItemName(${index}, this.value)">
          <div class="hotkey-badge-container">${hotkeyHtml}</div>
          <div class="price-container" title="Unit value in Divines">
            <input type="number" class="price-input" value="${item.price !== undefined ? item.price : 0}" step="0.1" min="0" ${state.activePreset === "__ALL__" ? 'disabled' : ''} onchange="updateItemPrice(${index}, this.value)">
            <span class="price-label">D</span>
          </div>
          <div class="counter-controls">
            <button class="btn-step" onclick="changeCount(${index}, -1)">-</button>
            <input type="number" class="count-input ${colorClass}" id="count-input-${index}" value="${item.count}" min="0" onchange="updateItemCount(${index}, this.value)">
            <button class="btn-step" onclick="changeCount(${index}, 1)" style="background-color: var(--accent-blue)">+</button>
          </div>
        `;

        if (state.activePreset !== "__ALL__") {
          row.addEventListener('dragstart', handleDragStart);
          row.addEventListener('dragover', handleDragOver);
          row.addEventListener('drop', handleDrop);
          row.addEventListener('dragend', handleDragEnd);
        }

        list.appendChild(row);
      });

      updateProfitDisplay();
      renderItemsPanel();
    }

    // --- DRAG AND DROP ---
    let dragSrcIndex = null;
    function handleDragStart(e) {
      if (['INPUT', 'BUTTON'].includes(e.target.tagName)) { e.preventDefault(); return; }
      dragSrcIndex = parseInt(this.dataset.index, 10);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); e.dataTransfer.dropEffect = 'move'; return false; }
    function handleDrop(e) {
      e.stopPropagation();
      const targetIndex = parseInt(this.dataset.index, 10);
      if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
        const movedItem = state.counters.splice(dragSrcIndex, 1)[0];
        state.counters.splice(targetIndex, 0, movedItem);
        renderItems();
        autoSyncPreset();
        saveState();
      }
      return false;
    }
    function handleDragEnd() { this.classList.remove('dragging'); dragSrcIndex = null; }

    function changeCount(index, amount) {
      if (state.activePreset === "__ALL__") {
        alert("⚠️ Select a specific preset to change counts directly.");
        return;
      }
      state.counters[index].count = Math.max(0, state.counters[index].count + amount);

      if (amount > 0 && !timerInterval) toggleTimer();

      const row = document.getElementById(`item-row-${index}`);
      if (row) {
        if (state.counters[index].count > 0) {
          row.classList.add('has-count');
        } else {
          row.classList.remove('has-count');
        }
      }

      const inputEl = document.getElementById(`count-input-${index}`);
      if (inputEl) {
        inputEl.value = state.counters[index].count;
        inputEl.className = `count-input ${getCountColorClass(state.counters[index].count)}`;
      }

      updateProfitDisplay();
      autoSyncPreset();
      saveState();
    }

    function updateItemCount(index, val) {
      if (state.activePreset === "__ALL__") return;
      const current = parseInt(val, 10);
      const finalVal = (isNaN(current) || current < 0) ? 0 : current;
      state.counters[index].count = finalVal;
      
      const row = document.getElementById(`item-row-${index}`);
      if (row) {
        if (finalVal > 0) row.classList.add('has-count');
        else row.classList.remove('has-count');
      }

      const inputEl = document.getElementById(`count-input-${index}`);
      if (inputEl) {
        inputEl.className = `count-input ${getCountColorClass(finalVal)}`;
      }

      updateProfitDisplay();
      autoSyncPreset();
      saveState();
    }

    function removeItem(index) {
      state.counters.splice(index, 1);
      renderItems();
      autoSyncPreset();
      saveState();
    }

    function resetAllCounts() {
      state.counters.forEach(c => c.count = 0);
      renderItems();
      autoSyncPreset();
      saveState();
    }

    // --- ITEMS PANEL ---
    function addItemFromPanel() {
      if (!state.activePreset || state.activePreset === "__ALL__") {
        alert("⚠️ Create or select a specific Preset before adding items!");
        return;
      }

      const inputName = document.getElementById('newItemName');
      const inputPrice = document.getElementById('newItemPrice');
      const btnHotkey = document.getElementById('btnNewItemHotkey');
      
      const name = inputName.value.trim();
      const price = parseFloat(inputPrice.value) || 0;

      if (name) {
        state.counters.push({ name, price, count: 0, hotkey: tempNewItemHotkey });
        inputName.value = '';
        inputPrice.value = '';
        inputPrice.disabled = true;
        inputPrice.style.opacity = "0.5";
        tempNewItemHotkey = null;
        if (btnHotkey) {
          btnHotkey.innerText = "Hotkey";
          btnHotkey.disabled = true;
          btnHotkey.style.opacity = "0.5";
        }
        renderItems();
        renderItemsPanel();
        autoSyncPreset();
        saveState();
      }
    }

    function updateItemName(index, newName) {
      if (state.activePreset === "__ALL__") return;
      state.counters[index].name = newName;
      autoSyncPreset();
      saveState();
    }

    function updateItemPrice(index, newPrice) {
      if (state.activePreset === "__ALL__") return;
      const val = parseFloat(newPrice);
      state.counters[index].price = (isNaN(val) || val < 0) ? 0 : val;
      renderItems();
      autoSyncPreset();
      saveState();
    }

    function renderItemsPanel() {
      const list = document.getElementById('panelItemsManageList');
      if (!list) return;

      list.innerHTML = '';

      if (!state.counters || state.counters.length === 0 || state.activePreset === "__ALL__") {
        list.innerHTML = '<div style="color:#888; font-style:italic;">Select a valid preset to manage items.</div>';
        return;
      }

      state.counters.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'item-manage-card';

        const keyLabel = item.hotkey ? `[ ${item.hotkey} ]` : "Hotkey";

        card.innerHTML = `
          <div class="panel-row">
            <input type="text" value="${item.name}" style="font-weight:bold; flex:1; min-width:80px;" onchange="updateItemName(${index}, this.value)">
            <button class="btn-key-bind" style="min-width:65px; padding:3px 4px; font-size:10px;" onclick="startListeningHotkey('item', ${index}, this)">${keyLabel}</button>
            <div style="display:flex; align-items:center; gap:2px;">
              <input type="number" value="${item.price}" step="0.1" min="0" style="width:45px; background:var(--bg-color); border:1px solid #555; color:#ffd700; padding:2px 4px; border-radius:3px; text-align:right;" onchange="updateItemPrice(${index}, this.value)">
              <span style="font-size:10px; color:#888; font-weight:bold;">D</span>
            </div>
            <button class="btn-del" onclick="removeItem(${index})" title="Remove item">🗑</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    // --- HOTKEYS MANAGEMENT (SYSTEM + ITEMS) ---
    function startListeningHotkey(targetType, targetIndex, btnEl) {
      btnEl.innerText = "Press key...";
      btnEl.classList.add('listening');

      const keyHandler = (e) => {
        e.preventDefault();
        e.stopPropagation();

        if (e.key === 'Escape') {
          if (targetType === 'system') {
            state.systemHotkeys[targetIndex] = null;
          } else {
            state.counters[targetIndex].hotkey = null;
          }
          finalizeBinding(keyHandler);
          return;
        }

        const combo = buildHotkeyString(e);
        if (!combo) return;

        if (state.systemHotkeys) {
          Object.keys(state.systemHotkeys).forEach(k => {
            if (state.systemHotkeys[k] === combo) state.systemHotkeys[k] = null;
          });
        }

        if (state.counters) {
          state.counters.forEach(item => {
            if (item.hotkey === combo) item.hotkey = null;
          });
        }

        if (targetType === 'system') {
          state.systemHotkeys[targetIndex] = combo;
        } else {
          state.counters[targetIndex].hotkey = combo;
        }

        finalizeBinding(keyHandler);
      };

      window.addEventListener('keydown', keyHandler, true);
    }

    function finalizeBinding(handler) {
      window.removeEventListener('keydown', handler, true);
      renderItems();
      renderHotkeysPanel();
      renderItemsPanel();
      autoSyncPreset();
      saveState();
    }

    function renderHotkeysPanel() {
      const sysList = document.getElementById('systemHotkeyList');
      if (!sysList) return;

      sysList.innerHTML = '';
      const sysActions = [
        { key: 'timer', label: 'Start / Stop' },
        { key: 'finishRun', label: 'Run' },
        { key: 'newPreset', label: 'Preset (+)' }
      ];

      sysActions.forEach(action => {
        const row = document.createElement('div');
        row.className = 'hotkey-setting-row';
        const currentKey = (state.systemHotkeys && state.systemHotkeys[action.key]) ? state.systemHotkeys[action.key] : null;
        const keyLabel = currentKey ? `[ ${currentKey} ]` : "Click to set";

        row.innerHTML = `
          <span style="font-weight:bold; font-size:12px;">${action.label}</span>
          <button class="btn-key-bind" onclick="startListeningHotkey('system', '${action.key}', this)">${keyLabel}</button>
        `;
        sysList.appendChild(row);
      });
    }

    // --- PRESETS & DROPDOWN ---
    function autoSyncPreset() {
      if (state.activePreset && state.activePreset !== "__ALL__" && state.presets[state.activePreset]) {
        state.presets[state.activePreset] = JSON.parse(JSON.stringify(state.counters));
      }
    }

    function updateHeaderSelect() {
      const select = document.getElementById('presetSelect');
      select.innerHTML = '';

      const addOpt = document.createElement('option');
      addOpt.value = "__NEW__";
      addOpt.textContent = "➕ Create New Preset...";
      select.appendChild(addOpt);

      const presetKeys = Object.keys(state.presets);
      
      if (presetKeys.length > 1) {
        const allOpt = document.createElement('option');
        allOpt.value = "__ALL__";
        allOpt.textContent = "🔄 All";
        if (state.activePreset === "__ALL__") allOpt.selected = true;
        select.appendChild(allOpt);
      }

      if (presetKeys.length === 0) {
        const noneOpt = document.createElement('option');
        noneOpt.value = "";
        noneOpt.textContent = "No preset selected";
        noneOpt.selected = true;
        noneOpt.disabled = true;
        select.appendChild(noneOpt);
      } else {
        presetKeys.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          if (name === state.activePreset) opt.selected = true;
          select.appendChild(opt);
        });
      }
    }

    function handlePresetSelect(val) {
      if (val === "__NEW__") {
        setTimeout(createNewPresetFlow, 50);
      } else if (val === "__ALL__") {
        state.activePreset = "__ALL__";
        renderItems();
        updateHeaderSelect();
        renderPresetsPanel();
        renderHistoryPanel();
        saveState();
      } else if (val) {
        loadPreset(val);
      }
    }

    function createNewPresetFlow() {
      const name = prompt("Enter the name of the new preset/farm:");
      if (!name || !name.trim()) {
        updateHeaderSelect();
        return;
      }

      const cleanName = name.trim();
      let newItems = [];

      if (state.counters && state.counters.length > 0 && state.activePreset !== "__ALL__") {
        const shouldCopy = confirm(`Do you want to copy items from the current preset (${state.activePreset || 'current'}) to the new preset '${cleanName}'?`);
        if (shouldCopy) {
          newItems = JSON.parse(JSON.stringify(state.counters));
          newItems.forEach(item => item.count = 0);
        }
      }

      state.presets[cleanName] = newItems;
      loadPreset(cleanName);
    }

    function loadPreset(name) {
      if (state.presets[name]) {
        state.activePreset = name;
        state.counters = JSON.parse(JSON.stringify(state.presets[name]));
        
        renderItems();
        updateHeaderSelect();
        renderPresetsPanel();
        renderHistoryPanel();
        saveState();
      }
    }

    function savePresetFromPanel() {
      const input = document.getElementById('presetNameInput');
      const btnHotkey = document.getElementById('btnNewPresetHotkey');
      const name = input.value.trim();
      if (!name) return;

      if (!state.presetHotkeys) state.presetHotkeys = {};

      let newItems = [];
      if (state.counters && state.counters.length > 0 && state.activePreset !== "__ALL__") {
        const shouldCopy = confirm(`Do you want to copy current items to the new preset '${name}'?`);
        if (shouldCopy) {
          newItems = JSON.parse(JSON.stringify(state.counters));
          newItems.forEach(item => item.count = 0);
        }
      }

      state.presets[name] = newItems;
      if (tempNewPresetHotkey) {
        state.presetHotkeys[name] = tempNewPresetHotkey;
      }
      state.activePreset = name;

      input.value = '';
      tempNewPresetHotkey = null;
      if (btnHotkey) {
        btnHotkey.innerText = "Hotkey";
        btnHotkey.disabled = true;
        btnHotkey.style.opacity = "0.5";
      }

      loadPreset(name);
    }

    function deletePreset(name) {
      delete state.presets[name];
      if (state.presetHotkeys) delete state.presetHotkeys[name];

      state.history = state.history.filter(run => run.presetName !== name);

      const keys = Object.keys(state.presets);
      if (keys.length > 0) {
        loadPreset(keys[0]);
      } else {
        state.activePreset = null;
        state.counters = [];
        renderItems();
        updateHeaderSelect();
        renderPresetsPanel();
        saveState();
      }

      renderHistoryPanel();
    }

    function renderPresetsPanel() {
      const list = document.getElementById('presetList');
      list.innerHTML = '';

      const keys = Object.keys(state.presets);
      if (keys.length === 0) {
        list.innerHTML = '<div style="color:#888; font-style:italic;">No saved presets.</div>';
        return;
      }

      if (!state.presetHotkeys) state.presetHotkeys = {};

      keys.forEach(name => {
        const row = document.createElement('div');
        row.className = 'panel-row';
        const isActive = (state.activePreset === name);
        const keyLabel = state.presetHotkeys[name] ? `[ ${state.presetHotkeys[name]} ]` : "Hotkey";

        row.innerHTML = `
          <input type="text" value="${name}" style="font-weight:${isActive ? 'bold' : 'normal'}; color:${isActive ? 'var(--profit-color)' : '#fff'}; flex:1; min-width:60px;" onchange="renamePreset('${name}', this.value)">
          <button class="btn-key-bind" onclick="startListeningPresetHotkey('${name}', this)">${keyLabel}</button>
          <button class="preset-item-btn" onclick="loadPreset('${name}')" style="background:${isActive ? 'var(--accent-blue)' : '#3a3d41'};">${isActive ? 'Active ✓' : 'Use'}</button>
          <button class="btn-del" onclick="deletePreset('${name}')" title="Delete this preset and its history">🗑</button>
        `;
        list.appendChild(row);
      });
    }

    function startListeningPresetHotkey(presetName, btnEl) {
      btnEl.innerText = "Press...";
      btnEl.classList.add('listening');

      const keyHandler = (e) => {
        e.preventDefault();
        e.stopPropagation();

        if (e.key === 'Escape') {
          if (!state.presetHotkeys) state.presetHotkeys = {};
          state.presetHotkeys[presetName] = null;
          finalizePresetBinding(keyHandler);
          return;
        }

        const combo = buildHotkeyString(e);
        if (!combo) return;

        if (!state.presetHotkeys) state.presetHotkeys = {};
        Object.keys(state.presetHotkeys).forEach(k => {
          if (state.presetHotkeys[k] === combo) state.presetHotkeys[k] = null;
        });

        state.presetHotkeys[presetName] = combo;
        finalizePresetBinding(keyHandler);
      };

      window.addEventListener('keydown', keyHandler, true);
    }

    function finalizePresetBinding(handler) {
      window.removeEventListener('keydown', handler, true);
      renderPresetsPanel();
      saveState();
    }

    function renamePreset(oldName, newNameRaw) {
      const newName = newNameRaw.trim();
      if (!newName || newName === oldName) {
        renderPresetsPanel();
        return;
      }
      if (state.presets[newName]) {
        alert("A preset with this name already exists!");
        renderPresetsPanel();
        return;
      }

      state.presets[newName] = state.presets[oldName];
      delete state.presets[oldName];

      if (state.presetHotkeys && state.presetHotkeys[oldName]) {
        state.presetHotkeys[newName] = state.presetHotkeys[oldName];
        delete state.presetHotkeys[oldName];
      }

      state.history.forEach(run => {
        if (run.presetName === oldName) run.presetName = newName;
      });

      if (state.activePreset === oldName) {
        state.activePreset = newName;
      }

      updateHeaderSelect();
      renderPresetsPanel();
      renderHistoryPanel();
      saveState();
    }

    // --- PANELS CONTROL ---
    function closeAllPanels() {
      ['panelPresets', 'panelItems', 'panelDisplay', 'panelHotkeys', 'panelData'].forEach(id => {
        document.getElementById(id).classList.remove('open');
      });
    }

    function togglePanel(panelId, e) {
      if (e) e.stopPropagation();
      const targetMap = {
        presets: document.getElementById('panelPresets'),
        items: document.getElementById('panelItems'),
        display: document.getElementById('panelDisplay'),
        hotkeys: document.getElementById('panelHotkeys'),
        data: document.getElementById('panelData')
      };

      const target = targetMap[panelId];
      const isOpen = target.classList.contains('open');

      closeAllPanels();
      if (!isOpen) {
        target.classList.add('open');
        if (panelId === 'hotkeys') renderHotkeysPanel();
        if (panelId === 'items') renderItemsPanel();
      }
    }

    ['panelPresets', 'panelItems', 'panelDisplay', 'panelHotkeys', 'panelData'].forEach(id => {
      const panel = document.getElementById(id);
      let leaveTimer = null;

      panel.addEventListener('mouseleave', () => {
        leaveTimer = setTimeout(() => {
          panel.classList.remove('open');
        }, 300);
      });

      panel.addEventListener('mouseenter', () => {
        if (leaveTimer) clearTimeout(leaveTimer);
      });
    });

    // --- DISPLAY, LAYOUT & OPACITY ---
    function setScale(val) {
      state.scale = val;
      document.documentElement.style.setProperty('--scale', val);
      renderDisplayPanel();
      saveState();
    }

    function setLayout(mode) {
      state.layout = mode;
      const list = document.getElementById('itemList');
      
      if (mode === 'horizontal') {
        document.body.classList.add('layout-horizontal');
        list.classList.add('horizontal');
      } else {
        document.body.classList.remove('layout-horizontal');
        list.classList.remove('horizontal');
      }
      renderDisplayPanel();
      saveState();
    }

    function setOpacity(val) {
      state.opacity = parseFloat(val);
      document.documentElement.style.setProperty('--opacity', val);
      document.getElementById('opacityVal').innerText = `${Math.round(val * 100)}%`;
      saveState();
    }

    function renderDisplayPanel() {
      const sP = document.getElementById('btnScaleP');
      const sM = document.getElementById('btnScaleM');
      const sG = document.getElementById('btnScaleG');
      if (sP && sM && sG) {
        sP.style.background = state.scale === 0.85 ? 'var(--accent-blue)' : '#3a3d41';
        sM.style.background = state.scale === 1 ? 'var(--accent-blue)' : '#3a3d41';
        sG.style.background = state.scale === 1.2 ? 'var(--accent-blue)' : '#3a3d41';
      }

      const lV = document.getElementById('btnLayoutVert');
      const lH = document.getElementById('btnLayoutHoriz');
      if (lV && lH) {
        lV.style.background = state.layout === 'vertical' ? 'var(--accent-blue)' : '#3a3d41';
        lH.style.background = state.layout === 'horizontal' ? 'var(--accent-blue)' : '#3a3d41';
      }
    }

    // --- PERSISTENCE ---
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try { 
          const parsed = JSON.parse(saved);
          state = { ...defaultState, ...parsed };
          if (!state.systemHotkeys) state.systemHotkeys = { timer: null, finishRun: null, newPreset: null };
        } catch (e) {}
      }

      setScale(state.scale || 1);
      setLayout(state.layout || 'vertical');
      
      const savedOpacity = state.opacity !== undefined ? state.opacity : 1;
      setOpacity(savedOpacity);
      document.getElementById('opacitySlider').value = savedOpacity;

      updateTimerDisplay();
      updateHeaderSelect();
      renderItems();
      renderPresetsPanel();
      renderHistoryPanel();
      renderDisplayPanel();
    }

    loadState();
  </script>
</body>
</html>
